spring.application.name=assessment
# Configuração de conexão com o PostgreSQL do Docker
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# Dialeto do PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Regra de Ouro do Legado: NUNCA alterar o schema, apenas validar! validate
spring.jpa.hibernate.ddl-auto=validate

# Exibir SQL no console (útil para debugar se o JPA está fazendo os JOINs corretos)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuração do Elasticsearch
spring.elasticsearch.uris=http://localhost:9200